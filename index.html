<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界生態之旅</title>
  <style>
    :root { --primary: #4caf50; --accent: #2196f3; --bg: #f4f7f6; }
    body { font-family: sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    #chat-container { width: 95%; max-width: 500px; height: 85vh; background: white; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    #scoreboard { background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; padding: 10px; display: flex; justify-content: space-around; font-weight: bold; }
    .stat-val { font-size: 22px; display: block; }
    #chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
    .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 16px; }
    .ai-msg { background: white; align-self: flex-start; border: 1px solid #eee; }
    .user-msg { background: var(--primary); color: white; align-self: flex-end; }
    #input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; }
    #user-input { flex-grow: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
    #send-btn { background: var(--accent); color: white; border: none; padding: 0 20px; margin-left: 8px; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>

<div id="chat-container">
  <div id="scoreboard">
    <div style="text-align:center">探索次數 <span id="count-num" class="stat-val">0</span></div>
    <div style="text-align:center">最佳紀錄 <span id="best-num" class="stat-val">--</span></div>
  </div>
  <div id="chat-box">
    <div class="message ai-msg">🌍 冒險家你好！我心中想著一種神秘動物，請提問特徵來猜猜我是誰。例如：「你住的地方冷嗎？」</div>
  </div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="輸入問題..." autocomplete="off">
    <button id="send-btn">傳送</button>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzModRkJ_zV_Z-hS3o4JoH81fZC0tAIfkFysuO7X9fn6Iz70aW-1gNcF1cJEthvOFhY/exec'; 
  const chatBox = document.getElementById('chat-box');
  const userInput = document.getElementById('user-input');
  const countDisplay = document.getElementById('count-num');
  const bestDisplay = document.getElementById('best-num');

  let questionCount = 0;
  let bestRecord = Infinity;
  let chatHistory = [{ role: "model", parts: [{ text: "遊戲開始。" }] }];

  function addMessage(text, sender) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender}-msg`;
    msgDiv.innerText = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    const lastAiMsg = chatHistory[chatHistory.length - 1].parts[0].text;
    const isReset = (lastAiMsg.includes("下一站") || lastAiMsg.includes("再玩")) && (text.includes("好") || text.includes("要") || text.includes("開始"));
    const isGuessing = text.includes("你是") || text.includes("它是") || text.includes("猜");

    if (isReset) {
      questionCount = 0;
    } else if (!isGuessing) {
      questionCount++; // 只有問問題才計次，猜測不計次
    }
    
    countDisplay.innerText = questionCount;
    addMessage(text, 'user');
    userInput.value = '';
    chatHistory.push({ role: "user", parts: [{ text: text }] });

    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ history: chatHistory })
      });
      const data = await response.json();
      if (data.reply) {
        addMessage(data.reply, 'ai');
        chatHistory.push({ role: "model", parts: [{ text: data.reply }] });

        if (data.reply.includes("對了") || data.reply.includes("猜對") || data.reply.includes("答對")) {
          if (questionCount > 0 && questionCount < bestRecord) {
            bestRecord = questionCount;
            bestDisplay.innerText = bestRecord;
          }
        }
      }
    } catch (e) { addMessage("連線異常，請檢查網路。", "ai"); }
  }

  document.getElementById('send-btn').onclick = sendMessage;
  userInput.onkeypress = (e) => { if(e.key==='Enter') sendMessage(); };
</script>
</body>
</html>
